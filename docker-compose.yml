services:
  subtitle-this:
    container_name: subtitle-this
    restart: unless-stopped

    # ── Image source ────────────────────────────────────────────────────────────
    # Pick ONE of the two blocks below.
    #
    # (A) Build locally — works from a shell on TrueNAS, your laptop, or any
    #     docker host. Best for development. TrueNAS Apps "Custom App" UI may
    #     not run `build:` — in that case use (B).
    build:
      context: .
      dockerfile: Dockerfile.openvino   # use `Dockerfile` for the CPU-only image
    #
    # (B) Pull from GHCR — paste-ready for TrueNAS Apps Custom App. Comment out
    #     the `build:` block above and uncomment the line below. Set GHCR_OWNER
    #     in your shell or .env to your GitHub username/org.
    # image: ghcr.io/${GHCR_OWNER}/subtitle-this:${IMAGE_FLAVOR:-openvino}
    # ────────────────────────────────────────────────────────────────────────────

    ports:
      - "8765:8765"

    # cgroup limits — enforced by the kernel so a runaway transcription
    # CANNOT take the host down. Sized for the default workload (one job at
    # a time, openvino+small Whisper, NLLB-600M, audio mode on a 2h film):
    # ~2-3 GB peak observed; 6g leaves headroom for a longer film or scene/
    # cinematic mode. Bump if you switched to whisper-medium/large or
    # NLLB 1.3B+. memswap == mem disables swap escape so the container OOMs
    # on its own ceiling instead of paging the host into oblivion.
    #
    # IMPORTANT for TrueNAS Apps users: these `mem_limit` / `cpus` / etc.
    # keys are recognized by `docker compose` directly. If you deploy via
    # the TrueNAS Apps "Custom App" UI (which uses the same Compose schema),
    # they apply unchanged. If you ever switch to the Compose v3
    # `deploy.resources.limits` block, recall that swarm-mode is what
    # interprets that — under plain Docker Compose only the top-level
    # `mem_limit`/`cpus` keys take effect.
    mem_limit: 6g
    memswap_limit: 6g
    cpus: "4.0"
    pids_limit: 1024
    # Tighten ulimits a touch — ffmpeg and torch can fork-spam on bugs.
    ulimits:
      nproc: 4096
      nofile: 8192

    # Runtime user. The image defaults to `app` (UID/GID 568) which matches
    # TrueNAS Scale's `apps` user, so on TrueNAS this Just Works. Override via
    # PUID/PGID env vars if your host uses a different UID, e.g.
    # `PUID=1000 PGID=1000 docker compose up`. Set both to 0 for root.
    user: "${PUID:-568}:${PGID:-568}"

    # Intel iGPU passthrough — required for OpenVINO GPU inference.
    devices:
      - /dev/dri:/dev/dri
    group_add:
      # The `render` group GID on the host. Run `getent group render` on the
      # host to find yours. TrueNAS Scale 24.10+ typically uses 107; vanilla
      # Ubuntu uses 109. Override per-host via the RENDER_GID env var.
      - "${RENDER_GID:-107}"

    environment:
      BABEL_DEEPL_API_KEY: ${DEEPL_API_KEY:-}
      # Media server (Emby / Jellyfin / Plex). Easier to set from the
      # Settings UI after first boot, but if you want the container to
      # come up pre-configured, fill these. The api_key field doubles
      # as the X-Plex-Token when type=plex.
      BABEL_MEDIA_SERVER_TYPE: ${BABEL_MEDIA_SERVER_TYPE:-emby}
      BABEL_MEDIA_SERVER_URL: ${BABEL_MEDIA_SERVER_URL:-${EMBY_URL:-}}
      BABEL_MEDIA_SERVER_API_KEY: ${BABEL_MEDIA_SERVER_API_KEY:-${EMBY_API_KEY:-}}
      BABEL_WHISPER_BACKEND: ${BABEL_WHISPER_BACKEND:-openvino}
      BABEL_WHISPER_MODEL: ${BABEL_WHISPER_MODEL:-small}
      BABEL_OPENVINO_DEVICE: ${BABEL_OPENVINO_DEVICE:-AUTO}
      BABEL_NLLB_MODEL: ${BABEL_NLLB_MODEL:-facebook/nllb-200-distilled-600M}
      # Translation model — translates subtitle cues
      BABEL_TRANSLATION_LLM_TYPE: ${BABEL_TRANSLATION_LLM_TYPE:-anthropic}
      BABEL_TRANSLATION_LLM_MODEL: ${BABEL_TRANSLATION_LLM_MODEL:-claude-opus-4-7}
      BABEL_TRANSLATION_LLM_ENDPOINT: ${BABEL_TRANSLATION_LLM_ENDPOINT:-https://api.openai.com/v1}
      BABEL_TRANSLATION_LLM_API_KEY: ${BABEL_TRANSLATION_LLM_API_KEY:-}
      BABEL_TRANSLATION_LLM_SUPPORTS_VISION: ${BABEL_TRANSLATION_LLM_SUPPORTS_VISION:-true}
      # Vision model — describes scene keyframes (scene + cinematic modes)
      BABEL_VISION_LLM_TYPE: ${BABEL_VISION_LLM_TYPE:-anthropic}
      BABEL_VISION_LLM_MODEL: ${BABEL_VISION_LLM_MODEL:-claude-opus-4-7}
      BABEL_VISION_LLM_ENDPOINT: ${BABEL_VISION_LLM_ENDPOINT:-https://api.openai.com/v1}
      BABEL_VISION_LLM_API_KEY: ${BABEL_VISION_LLM_API_KEY:-}
      BABEL_VISION_LLM_ENABLED: ${BABEL_VISION_LLM_ENABLED:-true}
      # Optional HTTP Basic auth — "user:password". Empty (default) =
      # auth off. With a value set, every endpoint except /health requires
      # the credential, plus a same-origin check on POST/PATCH/DELETE/PUT
      # blocks cross-site CSRF abuse of the stored browser credentials.
      BABEL_AUTH_CREDENTIALS: ${BABEL_AUTH_CREDENTIALS:-}
      # Wall-clock cap for a single job, in seconds. 0 disables. 5400 = 90 min.
      BABEL_JOB_TIMEOUT_SECONDS: ${BABEL_JOB_TIMEOUT_SECONDS:-5400}
      # OpenVINO STT audio segmentation. Splits the extracted WAV into
      # N-second windows so peak audio RAM stays bounded regardless of
      # film length. 600s = 10 min ≈ 75 MB resident per segment.
      BABEL_STT_AUDIO_SEGMENT_SECONDS: ${BABEL_STT_AUDIO_SEGMENT_SECONDS:-600}
      # Forward overlap on segment reads so a speech region straddling
      # a segment boundary is processed in full within one segment. 30s
      # ≈ one decoder window; +~1.9 MB peak RAM during the read.
      BABEL_STT_SEGMENT_OVERLAP_SECONDS: ${BABEL_STT_SEGMENT_OVERLAP_SECONDS:-30}
      # Pack multiple short speech regions into shared 30s decoder
      # windows with brief silence pads. Cuts iGPU work 1.5-3× on
      # dialog-heavy films. Disable as an escape hatch on films where
      # you see misattributed cues at region boundaries.
      BABEL_STT_REGION_PACKING: ${BABEL_STT_REGION_PACKING:-true}
      # Hard cap on cues that get a per-cue frame in cinematic mode.
      # The remaining cues still translate, just text-only. 0 disables
      # cinematic frame extraction entirely.
      BABEL_CINEMATIC_MAX_CUES_WITH_FRAMES: ${BABEL_CINEMATIC_MAX_CUES_WITH_FRAMES:-800}

    volumes:
      # Cache: OpenVINO IR (slow first-run, fast after), HF model downloads,
      # per-file transcript cache, and settings.json mutated by the web UI.
      # Persist across restarts.
      - ./cache:/cache
      # Media library — READ-WRITE so the app can write .vtt files next to
      # source media. The container user (UID 568 / `app` by default, matching
      # TrueNAS Scale's apps user) must have write access. Edit the host path
      # to match your dataset (e.g. /mnt/tank/media:/mnt/media:rw).
      - /mnt/media:/mnt/media:rw
